version: 2

sources:
  - name: raw
    database: WEATHER_DB
    schema: RAW
    description: "Raw landing tables loaded by the Airflow pipeline from Open-Meteo APIs"
    tables:
      - name: raw_weather_api
        description: "Hourly weather readings per city"
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
      - name: raw_air_quality
        description: "Hourly air quality readings per city"
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}