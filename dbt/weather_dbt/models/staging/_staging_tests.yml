version: 2

models:
  - name: stg_weather
    description: >
      Cleaned and deduplicated hourly weather readings per city.
      Sourced from RAW_WEATHER_API. Keeps only the latest load per
      city and timestamp, and drops rows with null temperature.
    columns:
      - name: city_name
        description: "Name of the Indian city (Mumbai, Bangalore, Delhi, Chennai)"
        tests:
          - not_null
          - accepted_values:
              values: ['Mumbai', 'Bangalore', 'Delhi', 'Chennai']
      - name: recorded_at
        description: "Timestamp of the weather reading (hourly grain)"
        tests:
          - not_null
      - name: temperature_c
        description: "Air temperature in degrees Celsius"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -50
              max_value: 60
              row_condition: "temperature_c is not null"
      - name: humidity_pct
        description: "Relative humidity percentage"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "humidity_pct is not null"

  - name: stg_air_quality
    description: >
      Cleaned and deduplicated hourly air quality readings per city.
      Sourced from RAW_AIR_QUALITY.
    columns:
      - name: city_name
        description: "Name of the Indian city"
        tests:
          - not_null
          - accepted_values:
              values: ['Mumbai', 'Bangalore', 'Delhi', 'Chennai']
      - name: pm2_5
        description: "Fine particulate matter concentration (ug/m3)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
              row_condition: "pm2_5 is not null"