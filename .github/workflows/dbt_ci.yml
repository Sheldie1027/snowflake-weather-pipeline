name: dbt CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    name: Build and test dbt models
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      DBT_PRIVATE_KEY_PATH: /tmp/rsa_key.pem

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake

      - name: Decode the Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}" | base64 -d > /tmp/rsa_key.pem
          chmod 600 /tmp/rsa_key.pem

      - name: Put the CI profile in place
        working-directory: dbt/weather_dbt
        run: cp ci_profiles.yml profiles.yml

      - name: Install dbt packages
        working-directory: dbt/weather_dbt
        run: dbt deps --profiles-dir . --profile weather_dbt --target ci

      - name: Check dbt can connect
        working-directory: dbt/weather_dbt
        run: dbt debug --profiles-dir . --profile weather_dbt --target ci

      - name: Build and test all models
        working-directory: dbt/weather_dbt
        run: dbt build --profiles-dir . --profile weather_dbt --target ci
  
  sql-lint:
    name: Lint SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SQLFluff
        run: pip install sqlfluff
      - name: Lint models
        run: sqlfluff lint dbt/weather_dbt/models --dialect snowflake --templater jinja